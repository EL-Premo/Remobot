<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعم واتساب - سريع</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1ebea5 0%, #075e54 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; direction: rtl; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: #075e54; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: #1ebea5; }
        button { width: 100%; padding: 15px; background: #25d366; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #128c7e; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; text-align: center; font-size: 14px; padding: 10px; border-radius: 8px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📱 إرسال بلاغ دعم</h2>
        <div class="form-group">
            <label>رقم الهاتف (مثال: 966500000000)</label>
            <input type="tel" id="phone" placeholder="966..." dir="ltr">
        </div>
        <div class="form-group">
            <label>بريدك الإلكتروني للرد</label>
            <input type="email" id="email" placeholder="example@gmail.com" dir="ltr">
        </div>
        <button id="sendBtn">📤 إرسال البلاغ الآن</button>
        <div id="status"></div>
    </div>

    <script>
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');

        sendBtn.onclick = async () => {
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!phone || !email) return alert('يرجى ملء كافة الحقول');

            sendBtn.disabled = true;
            sendBtn.textContent = '⏳ جاري المعالجة...';
            statusDiv.style.display = 'none';

            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, email })
                });

                const result = await response.json();
                statusDiv.style.display = 'block';
                statusDiv.textContent = result.message;
                statusDiv.className = result.success ? 'success' : 'error';

                if (result.success) document.getElementById('phone').value = '';

            } catch (error) {
                statusDiv.style.display = 'block';
                statusDiv.textContent = '❌ فشل الاتصال بالسيرفر';
                statusDiv.className = 'error';
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '📤 إرسال البلاغ الآن';
            }
        };
    </script>
</body>
</html>
