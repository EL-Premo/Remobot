<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WhatsApp Support Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            direction: rtl;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--tg-theme-hint-color, #666);
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 8px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
            direction: ltr;
        }
        
        input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #0088cc);
        }
        
        input:disabled {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            opacity: 0.7;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        
        .status.success {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
            border: 1px solid #4caf50;
            display: block;
        }
        
        .status.error {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            border: 1px solid #f44336;
            display: block;
        }
        
        .status.info {
            background: rgba(33, 150, 243, 0.1);
            color: #2196f3;
            border: 1px solid #2196f3;
            display: block;
        }
        
        .user-info {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .user-info p {
            margin: 5px 0;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: var(--tg-theme-button-color, #0088cc);
            color: white;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .note {
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666);
            text-align: center;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--tg-theme-hint-color, #666);
        }
        
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .card {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 دعم واتساب</h1>
            <span class="badge">Mini App</span>
        </div>
        
        <div class="user-info" id="userInfo">
            <div class="loading">🔄 جاري التحقق من بياناتك...</div>
        </div>
        
        <div class="card" id="reportCard" style="display: none;">
            <div class="form-group">
                <label>📞 رقم الهاتف (بدون +)</label>
                <input type="tel" id="phoneNumber" placeholder="مثال: 966512345678" dir="ltr">
            </div>
            
            <div class="form-group">
                <label>📧 البريد الإلكتروني (مسجل مسبقاً)</label>
                <input type="email" id="email" placeholder="بريدك المسجل" dir="ltr" disabled>
            </div>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="note" id="note">
            💡只需要 إدخال رقم الهاتف ثم الضغط على الزر الأزرق في الأسفل
        </div>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        let user = null;
        let isRegistered = false;
        let userEmail = '';
        
        // تهيئة التطبيق
        tg.ready();
        tg.expand();
        
        // الحصول على بيانات المستخدم
        user = tg.initDataUnsafe?.user;
        
        if (!user) {
            document.getElementById('userInfo').innerHTML = `
                <p>⚠️ لا يمكن التعرف على المستخدم</p>
                <p>الرجاء فتح Mini App من داخل البوت</p>
            `;
            tg.MainButton.hide();
            return;
        }
        
        // التحقق من تسجيل المستخدم
        function checkUserRegistration() {
            try {
                // إرسال طلب التحقق إلى البوت
                const checkData = {
                    action: 'check_registration',
                    user_id: user.id
                };
                
                console.log('Checking registration:', checkData);
                
                // إرسال طلب التحقق
                tg.sendData(JSON.stringify(checkData));
                
                // ننتظر رد البوت
                // البوت سيرسل رسالة تحتوي على حالة التسجيل
                // وسيتم استقبالها في معالج WebApp
                
            } catch (error) {
                console.error('Error checking registration:', error);
                document.getElementById('userInfo').innerHTML = `
                    <p>❌ حدث خطأ في التحقق</p>
                    <p>الرجاء المحاولة مرة أخرى</p>
                `;
            }
        }
        
        // عرض واجهة المستخدم المسجل
        function showRegisteredInterface(email) {
            isRegistered = true;
            userEmail = email;
            
            document.getElementById('userInfo').innerHTML = `
                <p>👤 ${user.first_name || ''} ${user.last_name || ''}</p>
                <p>🆔 ${user.id}</p>
                <p>📝 ${user.username ? '@' + user.username : 'لا يوجد يوزرنيم'}</p>
                <p>✅ <span style="color: #4caf50;">✓ مسجل في النظام</span></p>
            `;
            
            document.getElementById('email').value = email;
            document.getElementById('reportCard').style.display = 'block';
            
            // إعداد Main Button
            tg.MainButton.setText("📤 إرسال البلاغ");
            tg.MainButton.show();
            tg.MainButton.disable();
            
            // التحقق من صحة رقم الهاتف
            const phoneInput = document.getElementById('phoneNumber');
            phoneInput.addEventListener('input', function() {
                const phone = this.value.trim();
                if (phone && phone.match(/^\d{8,15}$/)) {
                    tg.MainButton.enable();
                } else {
                    tg.MainButton.disable();
                }
            });
            
            // معالج الضغط على Main Button
            tg.MainButton.onClick(function() {
                sendReport();
            });
        }
        
        // عرض واجهة المستخدم غير المسجل
        function showUnregisteredInterface() {
            isRegistered = false;
            
            document.getElementById('userInfo').innerHTML = `
                <p>👤 ${user.first_name || ''} ${user.last_name || ''}</p>
                <p>🆔 ${user.id}</p>
                <p>📝 ${user.username ? '@' + user.username : 'لا يوجد يوزرنيم'}</p>
                <p>❌ <span style="color: #f44336;">✗ غير مسجل في النظام</span></p>
            `;
            
            document.getElementById('reportCard').style.display = 'none';
            document.getElementById('note').innerHTML = `
                ⚠️ يجب عليك التسجيل أولاً في البوت<br>
                استخدم /start في البوت للتسجيل
            `;
            
            tg.MainButton.hide();
        }
        
        async function sendReport() {
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            
            if (!phoneNumber) {
                tg.showPopup({
                    title: 'خطأ',
                    message: 'الرجاء إدخال رقم الهاتف',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            if (!phoneNumber.match(/^\d{8,15}$/)) {
                tg.showPopup({
                    title: 'خطأ',
                    message: 'الرقم يجب أن يحتوي على 8-15 رقم فقط',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            // إظهار مؤشر التحميل
            tg.MainButton.showProgress(true);
            tg.MainButton.setText("جاري الإرسال...");
            
            try {
                // إعداد البيانات للإرسال
                const reportData = {
                    action: 'send_report',
                    data: {
                        phone: phoneNumber,
                        user_id: user.id,
                        username: user.username || '',
                        first_name: user.first_name || ''
                    }
                };
                
                console.log('Sending report:', reportData);
                
                // إرسال البيانات عبر WebApp
                tg.sendData(JSON.stringify(reportData));
                
                // مسح حقل رقم الهاتف
                document.getElementById('phoneNumber').value = '';
                tg.MainButton.disable();
                
                // إظهار رسالة نجاح
                tg.showPopup({
                    title: 'تم الإرسال',
                    message: 'تم إرسال البلاغ بنجاح! سيتم معالجته خلال دقائق',
                    buttons: [{type: 'ok'}]
                });
                
                // إغلاق التطبيق بعد 2 ثانية
                setTimeout(() => {
                    tg.close();
                }, 2000);
                
            } catch (error) {
                console.error('Error:', error);
                tg.showPopup({
                    title: 'خطأ',
                    message: 'حدث خطأ: ' + error.message,
                    buttons: [{type: 'ok'}]
                });
            } finally {
                tg.MainButton.hideProgress(true);
                tg.MainButton.setText("📤 إرسال البلاغ");
            }
        }
        
        // بدء التحقق
        checkUserRegistration();
        
        // تحسين التطبيق للهواتف
        tg.setBackgroundColor('var(--tg-theme-bg-color)');
        tg.setHeaderColor('var(--tg-theme-header-bg-color)');
        
        // تحديث ارتفاع التطبيق
        const observer = new ResizeObserver(() => {
            tg.expand();
        });
        observer.observe(document.body);
        
        // استقبال الرد من البوت (يتم عبر رسائل WebApp)
        // البوت سيرسل رسالة تحتوي على الحالة، وهنا نستقبلها
        // ملاحظة: tg.sendData لا يمكنه استقبال رد مباشر
        // لذلك نعتمد على أن المستخدم سيرى رسالة من البوت
        // ويمكننا استخدام localStorage لتخزين الحالة مؤقتاً
    </script>
</body>
</html>
