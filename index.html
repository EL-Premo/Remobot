<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WhatsApp Support Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            direction: rtl;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--tg-theme-hint-color, #666);
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 8px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
            direction: ltr;
        }
        
        input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #0088cc);
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-5px); }
        }
        
        .status.success {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
            border: 1px solid #4caf50;
            display: block;
        }
        
        .status.error {
            background: rgba(244, 67, 54, 0.15);
            color: #f44336;
            border: 1px solid #f44336;
            display: block;
        }
        
        .status.info {
            background: rgba(33, 150, 243, 0.15);
            color: #2196f3;
            border: 1px solid #2196f3;
            display: block;
        }
        
        .user-info {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .user-info p {
            margin: 5px 0;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: var(--tg-theme-button-color, #0088cc);
            color: white;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .note {
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666);
            text-align: center;
        }
        
        .counter {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            font-weight: 500;
            color: var(--tg-theme-button-color, #0088cc);
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 8px;
            border-radius: 20px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }
        
        .counter-container {
            text-align: center;
            margin-top: 15px;
        }
        
        .clear-btn {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            color: var(--tg-theme-text-color, #666);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .clear-btn:active {
            opacity: 0.7;
            transform: scale(0.98);
        }
        
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .card {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 دعم واتساب</h1>
            <span class="badge">Mini App</span>
        </div>
        
        <div class="user-info" id="userInfo">
            <p>👤 جاري تحميل بيانات المستخدم...</p>
        </div>
        
        <div class="card">
            <div class="form-group">
                <label>📞 رقم الهاتف (بدون +)</label>
                <input type="tel" id="phoneNumber" placeholder="مثال: 966512345678" dir="ltr" autocomplete="off">
            </div>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="counter-container">
            <div class="counter" id="counter">📊 لم يتم إرسال أي بلاغ بعد</div>
            <button class="clear-btn" id="clearBtn" style="display: none;">🔄 إعادة ضبط العداد</button>
        </div>
        
        <div class="note">
            💡只需要 إدخال رقم الهاتف ثم الضغط على الزر الأزرق في الأسفل<br>
            📨 يمكنك إرسال عدة بلاغات متتالية - التطبيق يبقى مفتوحاً
        </div>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        let user = null;
        let sendCount = 0;
        let lastPhone = '';
        
        // تهيئة التطبيق - لا نغلق أبداً
        tg.ready();
        tg.expand();
        
        // الحصول على بيانات المستخدم
        user = tg.initDataUnsafe?.user;
        
        if (user) {
            document.getElementById('userInfo').innerHTML = `
                <p>👤 ${user.first_name || ''} ${user.last_name || ''}</p>
                <p>🆔 ${user.id}</p>
                <p>📝 ${user.username ? '@' + user.username : 'لا يوجد يوزرنيم'}</p>
                <p>✅ مرحباً بك! يمكنك الإرسال المتكرر</p>
            `;
        } else {
            document.getElementById('userInfo').innerHTML = '<p>⚠️ يرجى فتح Mini App من داخل البوت</p>';
        }
        
        // إعداد Main Button
        tg.MainButton.setText("📤 إرسال البلاغ");
        tg.MainButton.show();
        tg.MainButton.disable();
        
        // التحقق من صحة رقم الهاتف
        const phoneInput = document.getElementById('phoneNumber');
        const clearBtn = document.getElementById('clearBtn');
        
        phoneInput.addEventListener('input', function() {
            const phone = this.value.trim();
            if (phone && phone.match(/^\d{8,15}$/)) {
                tg.MainButton.enable();
            } else {
                tg.MainButton.disable();
            }
        });
        
        // معالج الضغط على Main Button
        tg.MainButton.onClick(function() {
            sendReport();
        });
        
        // تحديث العداد
        function updateCounter() {
            const counterDiv = document.getElementById('counter');
            if (sendCount === 0) {
                counterDiv.innerHTML = '📊 لم يتم إرسال أي بلاغ بعد';
                clearBtn.style.display = 'none';
            } else {
                counterDiv.innerHTML = `✅ تم إرسال ${sendCount} بلاغ${sendCount > 1 ? 'ات' : ''} بنجاح`;
                clearBtn.style.display = 'inline-block';
            }
        }
        
        // إعادة ضبط العداد
        clearBtn.onclick = function() {
            sendCount = 0;
            updateCounter();
            tg.showPopup({
                title: 'تم',
                message: 'تم إعادة ضبط العداد',
                buttons: [{type: 'ok'}]
            });
        };
        
        function hideStatusAfterDelay() {
            const statusDiv = document.getElementById('status');
            setTimeout(() => {
                if (statusDiv.style.display === 'block') {
                    statusDiv.style.animation = 'fadeOut 0.3s';
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                        statusDiv.style.animation = '';
                    }, 300);
                }
            }, 4000);
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
            
            hideStatusAfterDelay();
        }
        
        function sendReport() {
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            
            if (!phoneNumber) {
                tg.showPopup({
                    title: 'خطأ',
                    message: 'الرجاء إدخال رقم الهاتف',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            if (!phoneNumber.match(/^\d{8,15}$/)) {
                tg.showPopup({
                    title: 'خطأ',
                    message: 'الرقم يجب أن يحتوي على 8-15 رقم فقط',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            // حفظ آخر رقم تم إرساله
            lastPhone = phoneNumber;
            
            // إظهار مؤشر التحميل
            tg.MainButton.showProgress(true);
            tg.MainButton.setText("جاري الإرسال...");
            tg.MainButton.disable();
            
            try {
                // إعداد البيانات للإرسال
                const reportData = {
                    action: 'send_report',
                    data: {
                        phone: phoneNumber,
                        user_id: user?.id || 'unknown',
                        username: user?.username || '',
                        first_name: user?.first_name || ''
                    }
                };
                
                console.log('Sending report:', reportData);
                
                // إرسال البيانات عبر WebApp
                tg.sendData(JSON.stringify(reportData));
                
                // زيادة العداد
                sendCount++;
                updateCounter();
                
                // مسح حقل رقم الهاتف
                document.getElementById('phoneNumber').value = '';
                
                // إظهار رسالة نجاح
                showStatus(`✅ تم إرسال البلاغ رقم ${sendCount} بنجاح!`, 'success');
                
                // إظهار رسالة منبثقة (اختيارية)
                tg.showPopup({
                    title: 'تم الإرسال',
                    message: `✅ تم إرسال البلاغ رقم ${sendCount} بنجاح!\nيمكنك إرسال بلاغ آخر`,
                    buttons: [{type: 'ok'}]
                });
                
                // التركيز على حقل الإدخال للإرسال السريع
                setTimeout(() => {
                    document.getElementById('phoneNumber').focus();
                }, 100);
                
            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ حدث خطأ: ' + error.message, 'error');
                tg.showPopup({
                    title: 'خطأ',
                    message: 'حدث خطأ: ' + error.message,
                    buttons: [{type: 'ok'}]
                });
            } finally {
                tg.MainButton.hideProgress(true);
                tg.MainButton.setText("📤 إرسال البلاغ");
                // نعيد تمكين الزر فقط إذا كان الحقل فارغاً
                if (document.getElementById('phoneNumber').value.trim() === '') {
                    tg.MainButton.disable();
                }
            }
        }
        
        // تحسين التطبيق
        tg.setBackgroundColor('var(--tg-theme-bg-color)');
        tg.setHeaderColor('var(--tg-theme-header-bg-color)');
        
        // تحديث ارتفاع التطبيق عند أي تغيير
        const updateHeight = () => {
            setTimeout(() => tg.expand(), 50);
        };
        
        // مراقبة تغييرات الحجم
        const observer = new ResizeObserver(updateHeight);
        observer.observe(document.body);
        
        // مراقبة تغييرات المحتوى
        const observerContent = new MutationObserver(updateHeight);
        observerContent.observe(document.body, { childList: true, subtree: true, attributes: true });
        
        // دعم إرسال بالضغط على Enter
        phoneInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const phone = this.value.trim();
                if (phone && phone.match(/^\d{8,15}$/)) {
                    sendReport();
                } else if (phone) {
                    tg.showPopup({
                        title: 'خطأ',
                        message: 'رقم الهاتف غير صحيح (8-15 رقم)',
                        buttons: [{type: 'ok'}]
                    });
                }
            }
        });
        
        // حفظ آخر رقم في localStorage (اختياري)
        const savedPhone = localStorage.getItem('lastPhone');
        if (savedPhone && savedPhone.match(/^\d{8,15}$/)) {
            phoneInput.value = savedPhone;
            tg.MainButton.enable();
        }
        
        // حفظ آخر رقم عند تغييره
        phoneInput.addEventListener('change', function() {
            if (this.value.trim().match(/^\d{8,15}$/)) {
                localStorage.setItem('lastPhone', this.value.trim());
            }
        });
        
        console.log('Mini App ready - will stay open for multiple sends');
    </script>
</body>
</html>
