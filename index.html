<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WhatsApp Support Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            direction: rtl;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--tg-theme-hint-color, #666);
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 8px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
            direction: ltr;
        }
        
        input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #0088cc);
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        
        .status.success {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
            border: 1px solid #4caf50;
            display: block;
        }
        
        .status.error {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            border: 1px solid #f44336;
            display: block;
        }
        
        .status.info {
            background: rgba(33, 150, 243, 0.1);
            color: #2196f3;
            border: 1px solid #2196f3;
            display: block;
        }
        
        .user-info {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .user-info p {
            margin: 5px 0;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: var(--tg-theme-button-color, #0088cc);
            color: white;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .note {
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666);
            text-align: center;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        button:active {
            opacity: 0.8;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        @media (max-width: 480px) {
            body { padding: 15px; }
            .card { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 دعم واتساب</h1>
            <span class="badge">Mini App</span>
        </div>
        
        <div class="user-info" id="userInfo">
            <p>👤 جاري تحميل بيانات المستخدم...</p>
        </div>
        
        <div class="card">
            <div class="form-group">
                <label>📞 رقم الهاتف (بدون +)</label>
                <input type="tel" id="phoneNumber" placeholder="مثال: 966512345678" dir="ltr">
            </div>
            
            <button id="sendBtn" onclick="sendReport()">📤 إرسال البلاغ</button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="note">
            💡 ملاحظة: بريدك الإلكتروني مسجل مسبقاً في البوت<br>
            🔑 تحتاج فقط إلى إدخال رقم الهاتف
        </div>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        let user = null;
        
        // تهيئة التطبيق
        tg.ready();
        tg.expand();
        
        // محاولة الحصول على بيانات المستخدم بطرق مختلفة
        function getUserData() {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                return tg.initDataUnsafe.user;
            }
            if (tg.initData) {
                try {
                    const params = new URLSearchParams(tg.initData);
                    const userData = params.get('user');
                    if (userData) {
                        return JSON.parse(decodeURIComponent(userData));
                    }
                } catch(e) {
                    console.error('Error parsing initData:', e);
                }
            }
            return null;
        }
        
        // الحصول على بيانات المستخدم
        user = getUserData();
        
        if (user) {
            document.getElementById('userInfo').innerHTML = `
                <p>👤 ${user.first_name || ''} ${user.last_name || ''}</p>
                <p>🆔 ${user.id}</p>
                <p>📝 ${user.username ? '@' + user.username : 'لا يوجد يوزرنيم'}</p>
                <p>✅ متصل بالبوت</p>
            `;
            document.getElementById('sendBtn').disabled = false;
        } else {
            document.getElementById('userInfo').innerHTML = `
                <p>⚠️ لم يتم التعرف على المستخدم</p>
                <p>الرجاء فتح Mini App من داخل البوت</p>
            `;
            document.getElementById('sendBtn').disabled = true;
        }
        
        // إعداد Main Button (الزر الأزرق في الأسفل)
        if (tg.MainButton) {
            tg.MainButton.setText("📤 إرسال البلاغ");
            tg.MainButton.show();
            tg.MainButton.onClick(function() {
                sendReport();
            });
            
            tg.MainButton.disable();
            
            const phoneInput = document.getElementById('phoneNumber');
            phoneInput.addEventListener('input', function() {
                const phone = this.value.trim();
                if (phone && phone.match(/^\d{8,15}$/)) {
                    tg.MainButton.enable();
                } else {
                    tg.MainButton.disable();
                }
            });
        }
        
        async function sendReport() {
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const statusDiv = document.getElementById('status');
            
            if (!phoneNumber) {
                showStatus('الرجاء إدخال رقم الهاتف', 'error');
                if (tg.showPopup) tg.showPopup({title: 'خطأ', message: 'الرجاء إدخال رقم الهاتف', buttons: [{type: 'ok'}]});
                return;
            }
            
            if (!phoneNumber.match(/^\d{8,15}$/)) {
                showStatus('الرقم يجب أن يحتوي على 8-15 رقم فقط', 'error');
                if (tg.showPopup) tg.showPopup({title: 'خطأ', message: 'الرقم يجب أن يحتوي على 8-15 رقم فقط', buttons: [{type: 'ok'}]});
                return;
            }
            
            const btn = document.getElementById('sendBtn');
            if (btn) btn.disabled = true;
            if (tg.MainButton) {
                tg.MainButton.showProgress(true);
                tg.MainButton.setText("جاري الإرسال...");
            }
            
            showStatus('جاري إرسال البلاغ...', 'info');
            
            try {
                const reportData = {
                    phone: phoneNumber,
                    user_id: user?.id || 'unknown',
                    username: user?.username || '',
                    first_name: user?.first_name || ''
                };
                
                // ⚠️ ضع هنا رابط ملف الـ PHP الخاص بك الموجود على استضافتك
                const apiURL = 'https://your-domain.com/api/receive_report.php'; 
                
                const response = await fetch(apiURL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        initData: tg.initData,
                        data: reportData
                    })
                });

                if (!response.ok) {
                    throw new Error('فشل الاتصال بالخادم');
                }
                
                showStatus('✅ تم إرسال البلاغ بنجاح! جاري المعالجة...', 'success');
                
                document.getElementById('phoneNumber').value = '';
                if (tg.MainButton) tg.MainButton.disable();
                
                if (tg.showPopup) {
                    tg.showPopup({
                        title: 'تم الإرسال',
                        message: 'تم إرسال البلاغ بنجاح! سيتم معالجته خلال دقائق',
                        buttons: [{type: 'ok'}]
                    });
                }
                
                setTimeout(() => {
                    tg.close();
                }, 2000);
                
            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ حدث خطأ: ' + error.message, 'error');
                if (tg.showPopup) tg.showPopup({title: 'خطأ', message: 'حدث خطأ: ' + error.message, buttons: [{type: 'ok'}]});
            } finally {
                if (btn) btn.disabled = false;
                if (tg.MainButton) {
                    tg.MainButton.hideProgress(true);
                    tg.MainButton.setText("📤 إرسال البلاغ");
                }
            }
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            if (type !== 'error') {
                setTimeout(() => { statusDiv.style.display = 'none'; }, 5000);
            }
        }
        
        tg.setBackgroundColor('var(--tg-theme-bg-color)');
        tg.setHeaderColor('var(--tg-theme-header-bg-color)');
        
        const observer = new ResizeObserver(() => { tg.expand(); });
        observer.observe(document.body);
    </script>
</body>
</html>
