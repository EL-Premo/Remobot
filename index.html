<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WhatsApp Support Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            direction: rtl;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--tg-theme-hint-color, #666);
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 8px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
            direction: ltr;
        }
        
        input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #0088cc);
        }
        
        input:disabled {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            opacity: 0.7;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        button:active {
            opacity: 0.8;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        
        .status.success {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
            border: 1px solid #4caf50;
            display: block;
        }
        
        .status.error {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            border: 1px solid #f44336;
            display: block;
        }
        
        .status.info {
            background: rgba(33, 150, 243, 0.1);
            color: #2196f3;
            border: 1px solid #2196f3;
            display: block;
        }
        
        .user-info {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .user-info p {
            margin: 5px 0;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: var(--tg-theme-button-color, #0088cc);
            color: white;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .note {
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666);
            text-align: center;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--tg-theme-hint-color, #666);
        }
        
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .card {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 دعم واتساب</h1>
            <span class="badge">Mini App</span>
        </div>
        
        <div class="user-info" id="userInfo">
            <p>👤 جاري تحميل بيانات المستخدم...</p>
        </div>
        
        <div class="card">
            <div class="form-group">
                <label>📞 رقم الهاتف (بدون +)</label>
                <input type="tel" id="phoneNumber" placeholder="مثال: 966512345678" dir="ltr">
            </div>
            
            <div class="form-group">
                <label>📧 البريد الإلكتروني (يتم تعبئته تلقائياً)</label>
                <input type="email" id="email" placeholder="البريد المسجل" dir="ltr" disabled>
            </div>
            
            <button id="sendBtn" onclick="sendReport()">📤 إرسال البلاغ</button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="note">
            💡 ملاحظة: بريدك الإلكتروني محفوظ مسبقاً<br>
            🔑只需要 إدخال رقم الهاتف وإرسال البلاغ
        </div>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        let user = null;
        let userEmail = '';
        
        // تهيئة التطبيق
        tg.ready();
        tg.expand();
        
        // الحصول على بيانات المستخدم
        user = tg.initDataUnsafe?.user;
        
        if (user) {
            document.getElementById('userInfo').innerHTML = `
                <p>👤 ${user.first_name || ''} ${user.last_name || ''}</p>
                <p>🆔 ${user.id}</p>
                <p>📝 ${user.username ? '@' + user.username : 'لا يوجد يوزرنيم'}</p>
                <p>✅ مسجل في النظام</p>
            `;
            
            // طلب بيانات المستخدم من البوت
            loadUserData();
        } else {
            document.getElementById('userInfo').innerHTML = '<p>👤 زائر - الرجاء استخدام البوت أولاً</p>';
            document.getElementById('sendBtn').disabled = true;
        }
        
        async function loadUserData() {
            try {
                // إرسال طلب للحصول على بيانات المستخدم
                const requestData = {
                    action: 'get_user_data'
                };
                
                // ملاحظة: هذا الجزء يتطلب أن يكون البوت يرد على طلب البيانات
                // في الإصدار الحالي، سنستخدم البيانات المخزنة محلياً
                
                // بدلاً من ذلك، نعرض رسالة بأن المستخدم مسجل
                document.getElementById('email').placeholder = 'بريدك المسجل في البوت';
                document.getElementById('email').value = '✓ بريدك مسجل مسبقاً';
                
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }
        
        async function sendReport() {
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const statusDiv = document.getElementById('status');
            
            // التحقق من المدخلات
            if (!phoneNumber) {
                showStatus('الرجاء إدخال رقم الهاتف', 'error');
                return;
            }
            
            // التحقق من صيغة الرقم
            if (!phoneNumber.match(/^\d{8,15}$/)) {
                showStatus('الرقم يجب أن يحتوي على 8-15 رقم فقط', 'error');
                return;
            }
            
            // تعطيل الزر
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = 'جاري الإرسال...';
            
            showStatus('جاري إرسال البلاغ...', 'info');
            
            try {
                // إرسال البلاغ إلى البوت (البريد محفوظ مسبقاً)
                const reportData = {
                    action: 'send_report',
                    data: {
                        phone: phoneNumber
                        // ملاحظة: لا نحتاج لإرسال البريد وكلمة المرور
                        // لأن البوت سيستخدم البيانات المخزنة
                    }
                };
                
                // إرسال البيانات إلى البوت
                tg.sendData(JSON.stringify(reportData));
                
                showStatus('✅ تم إرسال البلاغ بنجاح! جاري المعالجة...', 'success');
                tg.showAlert('تم إرسال البلاغ بنجاح! سيتم معالجته خلال دقائق');
                
                // مسح حقل رقم الهاتف
                document.getElementById('phoneNumber').value = '';
                
                // إغلاق التطبيق بعد 3 ثواني
                setTimeout(() => {
                    tg.close();
                }, 3000);
                
            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ حدث خطأ. الرجاء المحاولة مرة أخرى', 'error');
                tg.showAlert('حدث خطأ. الرجاء المحاولة مرة أخرى');
            } finally {
                btn.disabled = false;
                btn.textContent = '📤 إرسال البلاغ';
            }
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            
            if (type !== 'error') {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
            }
        }
        
        // تحسين التطبيق للهواتف
        tg.setBackgroundColor('var(--tg-theme-bg-color)');
        tg.setHeaderColor('var(--tg-theme-header-bg-color)');
    </script>
</body>
</html>
